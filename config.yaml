# Positioning Meter — runtime configuration

universe:
  source_csv: "/Users/sgrelck/Documents/AI workflows/theme_detector/data/universe.csv"
  min_market_cap: 1_500_000_000  # $1.5B
  output_csv: "data/universe.csv"

clusters:
  source_json: "/Users/sgrelck/Documents/AI workflows/theme_detector/data/clusters.json"

backtest:
  start_date: "2016-05-08"  # 10y horizon
  end_date: null  # null => today

storage:
  db_path: "data/positioning.db"
  cache_dir: "data/cache"

providers:
  prices:
    primary: "polygon"      # polygon | yfinance
    fallback: "yfinance"
  options:
    primary: "yahoo_snapshot"  # yahoo_snapshot | polygon
    polygon_enabled: false
  ownership:
    use_edgar: true
    use_openinsider: true
  short_interest:
    source: "finra"
  estimates:
    enabled: false  # overlay only, not in composite

signals:
  history_window_days_slow: 1260   # 5y for positioning, valuation, technical
  history_window_days_fast: 252    # 1y for options
  options_eligibility:
    min_market_cap: 3_000_000_000
    min_avg_contract_volume: 1000

composite:
  # V1.5: valuation excluded (overlay-only).
  # V1.6 (tools/tune_weights.py grid search): positioning dominates pos vs tech.
  # V1.8: pct_peer changed from cluster-rank to universe-rank.
  # V1.9: bumped options weight (now that signs are correctly inverted —
  #   P/C, skew, term slope, IV rank are all natural "fear" measures, so
  #   their HIGH readings should map to COLD temp, not HOT). Options weight
  #   raised from 0.15 to 0.30 reflecting genuine sentiment value.
  # Backtest empirical optimum for pos vs tech alone is ~0.7/0.3. With
  # options at 0.30, scaling to pos 0.45 + tech 0.25 maintains pos:tech
  # ratio while giving options meaningful weight.
  # Will refine once options accumulates enough history for backtest tuning.
  bucket_weights:
    # V1.11: After FINRA SI backfill (8y universe-wide vs old 1y NASDAQ-only),
    # the si_true_dtc signal IC dropped from -0.103 to -0.010 — out-of-sample
    # reality check. Grid search now shows pos vs tech roughly balanced
    # (0.5/0.5 optimum). Updated to balanced pos+tech with options at 0.30.
    positioning: 0.35
    technical: 0.35
    options: 0.30
    flows: 0.00     # placeholder
    valuation: 0.00  # excluded — V1.5
  dual_percentile_weights:
    pct_self: 0.5
    pct_peer: 0.5
  compound_flags:
    late_signal_threshold: 85
    washout_threshold: 15
    divergence_min_technical: 80
    divergence_max_options: 30

etfs:
  sector:
    - XLK
    - SOXX
    - IGV
    - SMH
    - XLC
    - ARKK
    - QQQ
    - IYW
    - VGT
    - FDN
    - SKYY
    - CIBR
    - BOTZ
    - ROBO
  single_stock_leveraged:
    - TSLL
    - NVDL
    - MSFU
    - AMZU
    - GGLL
    - METU

logging:
  level: "INFO"
  log_dir: "logs"

rate_limits:
  yfinance_sleep_sec: 0.5
  edgar_req_per_sec: 8  # SEC limit is 10/sec, stay under
  polygon_req_per_min: 100
